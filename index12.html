<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
<script>
const take2 = curry((l, iter) => {
  // l은 뽑고자 하는 데이터의 목표 개수(limit)
  // iter는 데이터가 담긴 상자(배열, 제너레이터 등)
  let res = [];
  // 최종적으로 알맹이들을 담아 리턴할 빈 배열
  // 이 변수가 recur 밖에 호출되어 있기 때문에 recur함수가 재귀호출되어도 이 배열은 초기화 되지 않고 기존에 담아둔 값을 그대로 유지(클로저 현상)
  iter = iter[Symbol.iterator]();
  // 이터러블을 받아서 이터레이터로 만들기
  // iter.next()를 통해서 이를 호출할 때마다 차례대로 값을 꺼낼 수 있는 상태가 됨
  // 이 대리인 역시 recur함수 밖에 선언되어 있기에 recur이 새로 선언되어도 대리인은 자신이 지난번에 몇번째 값까지 꺼냈었는지 기억할 수 있음
  return function recur(){
    // 필요할 때마다 언제든 새로 작동시킬 수 있는 while문 공장 만들기(recur)
    // recur이라는 이름의 함수를 정의하자마자 맨뒤의 괄호를 통해 즉시 실행
    // 그리고 이 함수가 최종적으로 뱉는 값을 take2의 전체 값으로 리턴
    let cur;
    // 이터레이터가 뱉을 설명서 객체{value, done}을 임시로 저장할 변수
  while(!(cur = iter.next()).done){
    const a = cur.value;
    // 데이터가 남아있으먄 iter.next()가 {value: 10, done: false}이런식
    // 데이터가 다 끝나면 iter.next()가 {value: undefined, done: true}
    if(a instanceof Promise) return a.then(a=> {
      // 만약 꺼낸 a가 프로미스 상자라면 이 부분이 작동
      // return a.then 문장과 마주침
      // a.then(...)을 보는 순간, 상자 속 내용물을 꺼내는 것이 아니라 나중에 이 상자가 열리면 여기 적힌 화살표 함수를 실행해줘 라고 예약장부에 적어둠
      // 상자가 열리면 알맹이 자리에 진짜 숫자가 들어가면서 a => 부분이 실행됨
      return (res.push(a), res).length == l ? res : recur().catch(e => e == nop ? recur() : Promise.reject(e));
      // 예약 장부에 적자마자 이 부분이 실행됨
      // (res.push(a), res): 쉼표 연산자. 괄호 안에 쉼표를 쓰면 나열된 행동을 왼쪽부터 차례대로 다 실행하되, 최종 결과물은 맨 오른쪽 하나만 남겨라는 뜻임
      // 먼저 res.push(a)를 실행해서 배열에 알맹이를 집어넣음
      // 쉼표 오른쪽에 있는 res 배열만 남김 -> 결과적으로 이 괄호 덩어리는 값이 추가된 res 배열 그 자체로 변신
      // 그 res배열의 길이를 재서 길이가 l과 같으면 res를 반환하면서 함수를 끝내고 다르다면 recur()을 호출해서 while문이 다시 돌아가게 함
    });
    res.push(a);
    // 해당하는 값을 retun할 값에 push
    if (res.length == l) return res;
    // return 할 값이 length가 애초에 몇 개를 꺼내고자헸는지(l)과 비교해서 같아졌다면 즉시 리턴
  }
  }();
  // 이 괄호 덕분에 바로 즉시 실행
});

// kleisli composition

const isIterable = a => a && a[Symbol.iterator];
const go1 = (a,f) => a instanceof Promise ? a.then(f): f(a);


L.filter = curry(function *(f, iter){
  for(const a of iter){
    if (f(a)) yield a;
  }
});

const nop = Symbol('nop');
// 필터 탈락 신호 생성
// Symbol은 고유한 식별자를 만드는 기능
// 비동기 필터에서 탈락했을 때 take에게 이 데이터는 탈락이야 라고 에러신호(.catch)를 보냄 -> 이때 고유한, 오직 take함수만 알아볼 수 있는 신호를 만들어 다른 코드나 라이브러리에서 던진 에러 문자열과 겹쳐 오류가 나는 일이 없도록 함

L.filter2 = curry(function *(f, iter){
  for(const a of iter){
    // iter 주머니가 바닥날 때까지 순서대로 데이터를 하나씩 꺼내옴
    // 그리고 방금 꺼낸 원본 데이터를 임시로 a라고 부름
    const b = go1(a, f);
    // 방금 꺼낸 데이터 a를 조건 함수 f에 넣고 그 판정 결과를 b에 담기
    // a가 일반 숫자면 true나 false, a가 프로미스 상자면 b도 결과를 기다리는 프로미스 상자
    // a가 일반 숫자면 f(a)가 되는데 그 f는 a=>a%2. 이 값이 1이면(홀수면) true
    if (b instanceof Promise) yield b.then(b => b ? a : Promise.reject(nop));
    // 만약 b가 프로미스라면 아래 규칙이 적힌 예약 상자를 만들어서 take에 전달(yield)하고 잠깐 멈춤
    // yield한 내용은 .then으로 나중에 b 프로미스 상자가 열려서 그 결과가 참이면 a를 통과시키고 거짓이면 Promise.reject(nop)을 터트려 take에게 탈락 신호를 보냄
    // Promise.reject는 코드가 완전히 고장 났을 때 쓰는 에러 경보기
    // b가 열렸는데 그 값이 짝수라면(false) 상자 안에 Promise.reject(nop)을 넣어서 에러라고 판단
    // 그렇게 reject로 터지면 take는 .then 구역으로 가지 못하고 .catch 구역으로 강제 압송
    // 그 에러의 이름표가 nop인것을 확인하고 res에 아무것도 담지 않고 recur()을 실행해서 다음 데이터를 처리
    else if (b) yield a;
    // 만약 판정 결과인 b가 프로미스 상자가 아니라, 그냥 일반적인 값인데다 그 값이 참이라면 원본 데이터 a를 take에 yield한다.
    // 만약 b가 false라면 이 else if문에 걸리지 않으므로 아무것도 전달하지 않고 그냥 다음 숫자를 보러 for 문 맨 위로 올라간다.
  }
});


go([1,2,3,4,5,6],
  L.map(a=> Promise.resolve(a * a)),
  L.filter2(a=>a%2),
  take2(2),
  log
);
// 이 코드의 최종 목표는 배열을 받아서 각각 제곱을 하고 그 중 홀수만 골라내서 2개만 꺼내기 
// 중간에 Promise.resolve가 끼어들면서 모든 데이터가 프로미스 상자에 감싸진 채 흘러가게 됨 -> filter도 프로미스를 지원하도록 만들기

</script>
</body>
</html>
