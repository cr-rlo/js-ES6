<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
<div id ="cart"></div>
<script>
 const products = [
  { name: '반팔티', price: 15000, quantity: 1, is_selected: true },
  { name: '긴팔티', price: 20000, quantity: 2, is_selected: false },
  { name: '핸드폰 케이스', price: 15000, quantity: 3, is_selected: true },
  { name: '후드티', price: 30000, quantity: 4, is_selected: false },
  {name: '바지', price: 25000, quantity: 5, is_selected: false }
  ];

const curry = f => 
(a, ..._) => _.length ? f(a, ..._) : (..._) => f(a, ..._);
// 동작: 함수 f를 인자로 받아 새로운 함수 리턴
// 리턴된 함수가 실행될 때 인자가 2개 이상 들어오면 (_.length가 참이면) 원본 함수 f를 즉시 실행
// 인자가 하나만 들어오면 클로저 공간에 첫 번째 인자 a를 보관한 채 나머지 인자를 받아 f를 최종 실행하는 또 다른 함수를 리턴

const go = (...args) => reduce((a, f) => f(a),args);
  // 동작: 가변 인자(값과 함수들)을 받아 순차적으로 연산한 최종 값을 리턴
  // 원리: ...arg문법으로 입력된 모든 인자를 하나의 배열로 수집함
  // 그 후 내부에서 reduce를 실행하는데, 배열의 첫 번째 요소(초기값 a)를 다음 요소인 함수 f에 인자로 전달하여 실행한 값 f(a)를 얻고, 이 과정을 배열 끝까지 반복하여 데이터를 누적 전개함


const map = curry((f, iter) => {
  let res = [];
  for(const a of iter){
    res.push(f(a));
  }
  return res;
});
// 이터러블의 각 요소 함수를 f로 매핑한 새로운 배열을 리턴
// curry로 래핑되어 있어 인자가 1개만 들어오면 이터러블을 대기하는 함수를 리턴
// 인자가 모두 충족되면 for of 문으로 iter를 순회하며 각 요소 a를 f(a)에 대입하고 그 결과값을 res 배열에 삽입한 뒤 리턴함


const filter = curry((f, iter) => {
  let res = [];
  for(const a of iter){
    if (f(a)) res.push(a);
  }
  return res;
});

const reduce = curry((f, acc, iter) => {
  if(!iter){
    iter = acc[Symbol.iterator]();
    acc = iter.next().value;
  }
  for (const a of iter){
    acc = f(acc,a);
  }
  return acc;
})
// 이터러블 데이터를 하나의 단일 값으로 응축
// 세 번째 인자 iter가 생략되어 undefined가 되면 두 번째 인자 acc를 이터러블로 간주하여 이터레이터를 생성한 뒤 첫 번째 내부 값을 추출해 초기 acc로 설정
// 이후 for of 루프를 돌며 축약함수 f(acc, a)의 리턴값을 계속 acc 변수에 재할당하고 최후의 acc를 리턴

  const add = (a, b) => a+b;

  const sum = curry((f, iter) => go(
  iter,
  map(f),
  reduce(add)
  ));
  // 특정 조건으로 값을 추출하여 모두 합산하는 범용 축약 함수
  // curry가 적용되어 있어 sum(f)형태로 호출하면 iter를 인자로 받기 위해 대기하는 함수가 평가됨
  // 내부적으로는 입력받은 iter를 출발점으로 설정하여 map(f)로 값을 변환하고 reduce(add)로 값ㅇ르 누적 합산하는 go 파이프라인을 실행함

  const total_quantity = sum(p => p.quantity);
  // sum 함수에 첫 번째 인자인 보조 함수(p=>...)만 전달했으므로, 인자 부족으로 인해 iter를 입력받아 최종 연산을 수행할 수 있는 상태의 고차 함수가 각각 total_quantity 변수에 할당됨
  const total_price = sum(p => p.quantity * p.price);


document.querySelector('#cart').innerHTML = `
  <table>
    <tr>
      <th></th>
      <th>상품 이름</th>
      <th>가격</th>
      <th>수량</th>
      <th>총 가격</th>
    </tr>
  ${go(products,
    sum(p => `
      <tr>
        <td><input type="checkbox" ${p.is_selected ? 'checked':''}></td>
        <td>${p.name}</td>
        <td>${p.price}</td>
        <td><input type="number" value="${p.quantity}"></td>
        <td>${p.price * p.quantity}</td>
      </tr>
    `))}
    <!-- 1. go 함수 호출: go 함수의 첫 번째 인자로 products 배열이 전달됨
         2. sum 함수 평가: 두 번째 인자로 전달된 sum(...)함수는 curry 상태이므로 데이터를 기다리다가, go 내부의 reduce 연산에 의해 첫 번째 인자였던 products 배열을 자신의 iter 매개변수로 주입받아 동적 실행됨
         3. sum 내부의 map실행: products 배열의 요소 5개가 sum에 입력된 템플릿 리터럴 함수에 의해 각각 <tr></tr> 형태의 HTML 문자열 5개로 반환되어 배열 구조 
         4. sum 내부의 reduce 실행: 변환된 HTML 배열이 reduce(add)로 전달. 문자열 간의 + 연산이 루프를 돌며 연속 수행되므로, 배열 내부의 각 문자열 원소들이 쉼표 같은 유실 없이 하나의 거대한 연속된 HTML 문자열 스트링으로 합쳐짐
     -->

    <tr>
      <td colspan="2">합계</td>
      <td>${total_quantity(filter(p => p.is_selected, products))}</td>
      <td>${total_price(filter(p => p.is_selected, products))}</td>
    </tr>
  </table>
`;
</script>
</body>
</html>
