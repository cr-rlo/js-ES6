<!DOCTYPE html>

<script>
// reduce
const reduceF = (acc,a,f) => 
  // acc는 지금까지 쌓아온 누적값
  // a는 주머니에서 방금 꺼낸 데이터, f는 계산기함수(add)
  a instanceof Promise ? a.then(a=> f(acc,a), e => e== nop ? acc:Promise.reject(e)) : f(acc, a);
  // 자바스크립트의 .then()은 괄호 안에 쉼표를 기준으로 성공했을 때의 함수, 실패했을 때의 함수를 동시에 적을 수 있음
  // e(에러 내용)을 확인하고 acc를 그대로 리턴하고 e가 nop이 아닌 진자 에러라면 Promise.reject(e)를 통해 에러를 바깥으로 던져 프로그램을 멈춤


const go1 = (a,f) => a instanceof Promise ? a.then(f): f(a);

const head = iter => go1(take(1, iter), ([h]) => h);
// iter 주머니에서 첫 번째 알갱이 하나만 꺼내주는 함수
// 주머니에서 1개만 꺼내서 배열을 만듦
// go1(..., ([h]) =>): take가 준 결과가 일반 배열 [1]이면 구조 분해 할당을 통해 곧바로 숫자 1을 뱉음
// 만약 take가 준 결과가 프로미스 상자라면 go1덕분에 상자가 열릴 때까지 기다렸다가 알맹이가 나오면 배열에서 첫 번재 값 h를 꺼내서 리턴함

const reduce = curry((f, acc, iter) => {
  // f는 누적 계산기 함수 acc는 누적할 시작점 iter는 데이터가 담긴 주머니
  if(!iter) return reduce(f, head(iter = acc[Symbol.iterator]()), iter);
  // 사용자가 인자를 2개만 넣었을 때
  // 2번째 자리에 들어온 데이터 뭉치를(acc를) iterator로 만들고 iter 변수에 집어 넣음 -> 그리고 head 함수를 통해서 방금 만든 iter 변수를 집어 넣고 첫 번째 값을 안전하게 꺼내옴
  // 이제 reduce함수가 reduce(f, h, iter)로 세팅된 후 return을 통해서 이 함수를 반환하며 if문을 빠져나감

    iter = iter[Symbol.iterator]();
    return go1(acc, function recur(acc){
      let cur;
      while(!(cur = iter.next()).done){
        acc = reduceF(acc, a, f);
        if(acc instanceof Promise) return acc.then(recur);
      }
      return acc;
    });
});

const delay1000 = a => new Promise(resolve => setTimeout(() => resolve(a), 1000));

</script>

<script>
// 지연된 함수열을 병렬적으로 평가하기
// 대기된 함수들을 비동기가 일어나는 것을 제어하지 않고 다 실행을 시킴
// 지금까지의 reduce는 순차적 방식, C.reduce는 모든 상자를 동시에 한 방에 처리하는 방식

const C = {};
// 동시성 함수들을 모아둘 빈 상자 생성

function noop() {}
// 아무 일도 하지 않는 noop함수 생성
// 짝수 폭탄(에러 reject)가 터졌을 때 콘솔창 에러만 끄고 아무 것도 안할 것이기 때문에 이름 그대로 아무 것도 안하는 함수 정의

const catchNoop = arr => (arr.forEach(a => a instanceof Promise ? a.catch(noop) : a), arr);
// 자바스크립트 괄호 안의 쉼표는 행동 1을 먼저 하고 행동 2의 결과물을 리턴하라는 의미
// 배열을 받아서 그 배열의 알맹이가 프로미스 상자라면 나중에 에러가 날 때를 대비해 a.catch(noop)으로 달아둠
// .catch를 붙여두면 자바스크립트가 개발자가 수습중이라는 것으로 판단하고 콘솔창에 에러를 띄우지 않는다.
// 일반 숫자라면 아무 것도 할 필요 없으니 숫자 그대로 내버려둔다. => 프로미스는 미래에 실패할지 성공할지 모르는 예약 상자라면 일반숫자는 이미 계산이 끝난 최종 알맹이 상태이기 때문에 갑자기 에러때문에 터질 가능성이 없다

C.reduce = curry((f, acc, iter) => {
  const iter2 = catchNoop(iter ? [...iter] : [...acc]);
  // 인자 개수에 맞춰 주머니를 분해하고 배열로 만든다 -> 이 순간 모든 비동기 작업 동시 출발
  // 동시 출발하자마자 그 배열을 통째로 catchNoop에 집어 넣는다
  // catchNoop은 배열 안의 프로미스들에 안전 그물(noop)을 씌운 뒤 완성된 안전한 배열을 다시 리턴 -> 그 결과물을 iter 2에 담는다.
  return iter ?
// C.reduce 함수를 선언하고 curry로 감싼다
// 인자로 계산기 함수 f, 시작점 acc, 데이터 꾸러미 iter를 받는다
// 3번째 인자인 iter가 들어왔는지 검사하고 
  reduce(f, acc, iter2) :
  // 3개가 다 들어왔다면 기존에 만들어 두었던 순차적 reduce함수를 실행하되, 데이터 주머니를 그냥 넘기지 않고 [...iter]형태로 배열로 만들어 넘긴다.
  reduce(f, iter2);
});
  // 인자가 2개만 들어와서 iter가 없을 때는 2번째 자리에 있는 acc가 iter역할을 하기 때문에 acc를 배열로 만든 뒤 기존 reduce함수에 계산기 함수 f와 함께 던짐
  // [...]: ...으로 스프레드를 한 후 []로 다시 배열로 모음 -> 이 데이터 꾸러미 안에 있는 것들을 털어서 배열로 정리해라
  // 원래 지연 평가는 take나 reduce가 .next를 호출할 때만 실행, 중간에 프로미스를 만나면 상자가 열릴 때가지 멈췄다가 다음 숫자로 넘어갔음 => 1번 데이터 처리 시작 -> 0.1초대기 -> 2번 데이터 처리 -> 0.1초 대기 이런식
  // [...iter]문법을 만나면 컴퓨터는 프로미스가 열리든 말든 상관하지 않고 for문을 빠르게 돌려 주머니 안의 모든 대리인.next를 순식간에 다 호출함
  // 모든 데이터가 동시에 출발선에서 출발하게 됨
  // [...iter]가 최종적으로 만들어낸 배열은 [대기중인 프로미스1, 대기중인 프로미스2 ..]형태 
  // 모든 프로미스를 동시에 출발시켜 놓은 뒤 reduce 함수는 첫 번째 프로미스가 열리기를 기다렸다가 계산하고 두 번째 프로미스가 열리기를 기다림
  // 하지만 이미 모든 프로미스들이 동시에 일을 하고 있었기 때문에 첫 번째 프로미스가 끝났을 때 두 번째, 세 번째도 이미 끝나있는 상태가 됨

C.take = curry((l, iter) => take(l, catchNoop([...iter])));


go([1,2,3,4,5],
  L.map(a=>delay500(a*a)),
  L.filter(a=>delay500(a%2)),
  L.map(a=>delay500(a*a)),
  C.reduce(add),
  log
);
</script>
<script>
  // 즉시 병렬적으로 평가하기 - C.map, C.filter
C.takeAll = C.take(Infinity);
// 개수 제한 없이 주머니가 텅 빌 때까지 안에 있는 데이터를 싹 다 꺼내기  
// 그냥 꺼내는 것이 아니라 모든 비동기 작업을 동시에 출발시켜서 take하는 병렬형 함수


C.map = curry(pipe(L.map, C.takeAll));
// L.map 실행 -> L.map이 만든 예약 주머니가 C.takeAll에 토스
C.filter = curry(pipe(L.filter, C.takeAll));

C.map(a => delay1000(a*a), [1,2,3,4].then(log));

</script>

<script>
// 즉시 지연, Promise, 병렬적 조합하기
const delay500 = (a, name) => new Promise(resolve => {
  console.log(`${name}: ${a}`);
  setTimeout(() => resolve(a), 500);
});

console.time('');
go([1,2,3,4,5,6,7,8],
  map(a => delay500(a * a), 'map 1'),
  filter(a => delay500(a % 2), 'filter 2'),
  map(a => delay500(a+1), 'map 3'),
  take(2),
  log,
  _ => console.timeEnd('')
);




</script>
